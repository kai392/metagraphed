name: Backfill Stake Monthly (one-time, #1345)

# One-time MONTHLY backfill of the DEFERRED per-UID `stake_tao` field that the daily
# backfill (Backfill Neuron History) leaves NULL. Per-UID dTAO stake is runtime-only
# (childkey/TaoWeight math, not a raw storage read), so it can only come from the slow
# runtime get_metagraph_info — which also has a hard ~8-month decode floor. A monthly
# pass over the last ~8 months (~8 blocks x ~129 subnets) is the feasible enrichment.
#
# Reads OnFinality's public archive (free, no API key, retains historical state) via
# scripts/backfill-stake-monthly.py and POSTs each month's complete, stake-included rows
# to the Worker's secret-gated /api/v1/internal/backfill-neurons ingest. The upsert is
# idempotent on (netuid,uid,snapshot_date) → those monthly days are overwritten in place
# with full rows, so a re-run is safe. Manual only.
#
# scripts/backfill-stake-monthly.py now honors a SUBTENSOR_RPC_URL env override
# (same ADR 0012 convention as the live-state fetch scripts) -- once
# our own archive node finishes its genesis sync, repoint by setting that
# env var here (or by moving this job onto the indexer box entirely, matching the
# refresh-metagraph/refresh-account-identity/refresh-subnet-hyperparams migration
# pattern) instead of OnFinality's public archive.
#
# ONE job (NOT a matrix): OnFinality is a single endpoint, and the work is small enough
# (~8 months x ~5s/subnet) to finish well inside one runner.
on:
  workflow_dispatch:
    inputs:
      months:
        description: "Months back to backfill stake (runtime decode floor ~8)"
        required: false
        default: "8"

permissions:
  contents: read

concurrency:
  group: backfill-stake-monthly
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # ~8 months x ~129 subnets x ~5s/subnet, plus margin
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      # Runtime get_metagraph_info off OnFinality's public archive (pinned bittensor,
      # matching the daily backfill). One block per month, every subnet, stake included;
      # the ingest upsert is idempotent so a rerun is harmless.
      - name: Backfill monthly stake
        env:
          MONTHS_INPUT: ${{ github.event.inputs.months }}
          NEURON_DAILY_BACKFILL_SECRET: ${{ secrets.NEURON_DAILY_BACKFILL_SECRET }}
          METAGRAPH_API_BASE: https://api.metagraph.sh
        run: |
          MONTHS="${MONTHS_INPUT:-8}"
          if ! [[ "$MONTHS" =~ ^[0-9]+$ ]]; then
            echo "months must be an integer" >&2
            exit 1
          fi
          if (( MONTHS < 1 || MONTHS > 12 )); then
            echo "months must be between 1 and 12" >&2
            exit 1
          fi
          echo "backfilling stake for $MONTHS month(s)"
          uvx --from bittensor==10.4.0 python scripts/backfill-stake-monthly.py \
            --months "$MONTHS"

  notify-on-failure:
    needs: [backfill]
    if: ${{ always() && needs.backfill.result == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify on failure
        env:
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$METAGRAPH_ALERT_WEBHOOK_URL" ]; then
            exit 0
          fi
          curl -fsS -X POST "$METAGRAPH_ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d '{"content":"🔴 metagraphed backfill-stake-monthly FAILED — historical stake_tao backfill incomplete."}'
